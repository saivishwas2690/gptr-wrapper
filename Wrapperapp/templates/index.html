<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debatter - AI Debate Analysis</title>
    <style>
        :root {
            --bg-primary: #111111;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #3b82f6;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-header {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid var(--border);
        }

        .conversation-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        /* Research Input Section */
        .research-input {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .app-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .app-header h1 {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .app-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        #topicInput {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            font-size: 1.1rem;
            padding: 1rem;
        }

        #startButton {
            max-width: 200px;
            margin: 0 auto;
            font-size: 1.1rem;
            padding: 0.75rem 1.5rem;
        }

        /* Chat Section */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-secondary);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            max-width: 100%;
        }

        .message.assistant {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
        }

        .message.logs {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
        }

        /* Add markdown styling for messages */
        .message p {
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .message h1, 
        .message h2, 
        .message h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .message code {
            background-color: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }

        .message pre {
            background-color: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message ul, 
        .message ol {
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .message blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: var(--text-secondary);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 0.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .file-list {
            margin: 1rem 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border: 1px solid var(--border);
            margin: 0.5rem 0;
            border-radius: 0.25rem;
        }

        .download-btn {
            background-color: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            border: none;
            cursor: pointer;
        }

        .close-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 0.5rem;
            background-color: var(--border);
            color: var(--text-primary);
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .download-btn:hover, .close-btn:hover {
            opacity: 0.9;
        }

        .modal-content.markdown-viewer {
            background-color: var(--bg-secondary);
            padding: 2rem;
            border-radius: 0.5rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .markdown-content {
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content code {
            background-color: var(--bg-primary);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }

        .message.for {
            border-left: 4px solid #22c55e;  /* green */
        }

        .message.against {
            border-left: 4px solid #ef4444;  /* red */
        }

        .message.conclusion {
            border-left: 4px solid var(--accent);
            background-color: var(--bg-secondary);
        }

        .report-container {
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
        }

        .report-container p {
            margin-bottom: 0.5rem;
        }

        .image-gallery {
            padding: 1rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .gallery-header {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .image-preview {
            aspect-ratio: 1;
            border-radius: 0.375rem;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
            background-color: var(--bg-secondary);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview:hover {
            transform: scale(1.05);
        }

        .modal-content.image-viewer {
            background-color: var(--bg-secondary);
            padding: 1rem;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-content.image-viewer img {
            max-width: 100%;
            max-height: calc(90vh - 4rem);
            object-fit: contain;
            border-radius: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="app-header">
            <h1>🤝 Debatter</h1>
            <p>Enter any topic, and I'll analyze arguments for and against it, providing a balanced conclusion based on available information.</p>
        </div>

        <div class="research-input">
            <input 
                type="text" 
                id="topicInput" 
                placeholder="Enter a topic to debate (e.g., 'Should artificial intelligence be regulated?')" 
                style="flex: 1;"
            >
            <button onclick="startResearch()" id="startButton">Start Analysis</button>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be added here dynamically -->
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let isResearchComplete = false;
        let currentReportContainer = null;  // Track the current report container

        function startResearch() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('Please enter a topic to analyze');
                return;
            }

            // Reset the report container when starting new research
            currentReportContainer = null;

            // Initialize WebSocket
            socket = new WebSocket('ws://127.0.0.1:8080/ws/client');
            
            socket.onopen = () => {
                console.log('WebSocket connected');
                socket.send(topic);
                document.getElementById('startButton').disabled = true;
                document.getElementById('topicInput').disabled = true;
                
                // Add initial message
                addMessage('assistant', `🔍 Starting analysis of: "${topic}"\n\nI'll research arguments for and against this topic, examining various perspectives before providing a balanced conclusion.`);
            };

            socket.onmessage = (event) => {
                handleMessage(event.data);
            };

            socket.onclose = () => {
                console.log('WebSocket disconnected');
                enableChatInput();
            };
        }

        function handleMessage(data) {
            const messagesContainer = document.getElementById('chatMessages');
            try {
                const parsedData = JSON.parse(data);
                
                if (parsedData.type === 'path') {
                    const mdPath = parsedData.output.markdown || parsedData.output.md;
                    if (mdPath) {
                        fetchAndDisplayMarkdown(mdPath);
                    }
                } else if (parsedData.type === 'images') {
                    console.log('Received images:', parsedData.output); // Debug log
                    const imageContainer = document.createElement('div');
                    imageContainer.className = 'message image-gallery';
                    
                    // Ensure we're working with an array of image URLs
                    let imageUrls = parsedData.output;
                    if (!Array.isArray(imageUrls)) {
                        imageUrls = [imageUrls];
                    }

                    // Create gallery HTML
                    imageContainer.innerHTML = `
                        <div class="gallery-header">📸 Found Images:</div>
                        <div class="image-grid">
                            ${imageUrls.map(imgUrl => `
                                <div class="image-preview" onclick="showFullImage('${imgUrl}')">
                                    <img 
                                        src="${imgUrl}" 
                                        alt="Research image"
                                        onerror="this.onerror=null; this.src=''; this.parentElement.style.display='none';"
                                        loading="lazy"
                                    >
                                </div>
                            `).join('')}
                        </div>
                    `;
                    
                    // Append to messages container and scroll
                    messagesContainer.appendChild(imageContainer);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else if (parsedData.type === 'report') {
                    if (!currentReportContainer) {
                        currentReportContainer = document.createElement('div');
                        currentReportContainer.className = 'message logs report-container';
                        messagesContainer.appendChild(currentReportContainer);
                    }
                    currentReportContainer.innerHTML += marked.parse(parsedData.output);
                } else if (parsedData.type === 'logs') {
                    addMessage('logs', parsedData.output);
                } else {
                    addMessage('assistant', data);
                }
                
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (e) {
                console.error('Error handling message:', e);
                addMessage('assistant', data);
            }
        }

        function addMessage(type, content) {
            const messagesContainer = document.getElementById('chatMessages');
            
            // Don't create a new container for report type messages
            if (type === 'logs' && content.includes('Writing report')) {
                if (!currentReportContainer) {
                    currentReportContainer = document.createElement('div');
                    currentReportContainer.className = 'message logs report-container';
                    messagesContainer.appendChild(currentReportContainer);
                }
                currentReportContainer.innerHTML += marked.parse(content);
            } else {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;
                messageDiv.innerHTML = marked.parse(content);
                messagesContainer.appendChild(messageDiv);
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addConversation(topic) {
            const conversationsList = document.getElementById('conversationsList');
            const conversationDiv = document.createElement('div');
            conversationDiv.className = 'conversation-item';
            conversationDiv.textContent = topic;
            conversationDiv.onclick = () => {
                document.getElementById('topicInput').value = topic;
            };
            conversationsList.prepend(conversationDiv);
        }

        function enableChatInput() {
            document.getElementById('startButton').disabled = false;
            document.getElementById('topicInput').disabled = false;
            document.getElementById('startButton').textContent = 'Start New Analysis';
        }

        // Handle enter key for topic input
        document.getElementById('topicInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startResearch();
        });

        async function fetchAndDisplayMarkdown(filePath) {
            try {
                const response = await fetch('/fetch-markdown', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ file_path: filePath })
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch markdown');
                }

                const markdownContent = await response.text();
                
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content markdown-viewer">
                        <div class="markdown-content">${marked.parse(markdownContent)}</div>
                        <button onclick="closeModal()" class="close-btn">Close</button>
                    </div>
                `;
                document.body.appendChild(modal);

            } catch (error) {
                console.error('Error fetching markdown:', error);
                alert('Failed to load the markdown file. Please try again.');
            }
        }

        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) {
                modal.remove();
            }
        }

        function showFullImage(imageUrl) {
            console.log('Opening image:', imageUrl); // Debug log
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content image-viewer">
                    <img 
                        src="${imageUrl}" 
                        alt="Full size image"
                        onerror="this.onerror=null; this.src=''; alert('Failed to load image');"
                    >
                    <button onclick="closeModal()" class="close-btn">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
